name: unix-utilities
description: Common Unix utilities for text processing, searching, and file inspection

commands:
  - glob: "grep *"
    description: "Search text with patterns"
    pipe: true
    embedded: true
  - glob: "wc *"
    description: "Count lines, words, bytes"
    pipe: true
    embedded: true
  - glob: "wc"
    description: "Count from stdin"
    pipe: true
    embedded: true
  - glob: "head *"
    description: "Show first lines of input"
    pipe: true
    embedded: true
  - glob: "head"
    description: "Show first lines from stdin"
    pipe: true
    embedded: true
  - glob: "tail *"
    description: "Show last lines of input"
    pipe: true
    embedded: true
  - glob: "tail"
    description: "Show last lines from stdin"
    pipe: true
    embedded: true
  - glob: "sort *"
    description: "Sort lines"
    pipe: true
    embedded: true
  - glob: "sort"
    description: "Sort from stdin"
    pipe: true
    embedded: true
  - glob: "cat *"
    description: "Concatenate and display files"
    pipe: true
    embedded: true
  - glob: "less *"
    description: "Page through file contents"
    pipe: false
    embedded: false
  - glob: "find *"
    description: "Search for files in directory trees"
    pipe: true
    embedded: true
  - glob: "ls *"
    description: "List directory contents"
    pipe: true
    embedded: true
  - glob: "ls"
    description: "List current directory"
    pipe: true
    embedded: true
  - glob: "uniq *"
    description: "Filter duplicate lines"
    pipe: true
    embedded: true
  - glob: "uniq"
    description: "Filter duplicates from stdin"
    pipe: true
    embedded: true
  - glob: "cut *"
    description: "Extract fields from lines"
    pipe: true
    embedded: true
  - glob: "awk *"
    description: "Pattern scanning and processing"
    pipe: true
    embedded: true
  - glob: "sed *"
    description: "Stream editor for text transformation"
    pipe: true
    embedded: true
